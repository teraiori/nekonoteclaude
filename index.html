<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>認証完了</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; text-align: center; }
    .steps { text-align: left; background: #f8f8f8; border-radius: 8px; padding: 16px 24px; margin: 20px 0; }
    .steps li { margin: 10px 0; font-size: 15px; }
    #code-box { font-family: monospace; font-size: 18px; padding: 12px; background: #e8f0fe; border-radius: 6px; margin: 12px 0; letter-spacing: 1px; }
    .btn { display: inline-block; padding: 12px 28px; border-radius: 8px; font-size: 16px; cursor: pointer; border: none; background: #5865F2; color: white; }
    .btn:hover { background: #4752C4; }
    #status { margin-top: 12px; color: #2d7d46; font-size: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>✅ Google認証完了</h2>
  <ol class="steps">
    <li>下の「コードをコピー」を押す</li>
    <li>Discordで <strong>/tasks-code</strong> と入力してコマンドを選択</li>
    <li>コード欄にコピーしたコードを貼り付けて送信</li>
  </ol>
  <div id="code-box"></div>
  <button class="btn" onclick="copyCode()">コードをコピー</button>
  <div id="status"></div>
  <script>
    const code = new URLSearchParams(window.location.search).get('code');
    document.getElementById('code-box').textContent = code || '(コードが見つかりません)';

    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById('status').textContent = '✅ コピーしました！Discordで /tasks-code を入力して貼り付けてください。';
      }).catch(() => {
        document.getElementById('status').textContent = '上のコードを手動でコピーしてください。';
      });
    }
  </script>
</body>
</html>
